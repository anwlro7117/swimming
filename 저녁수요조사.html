<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🌙 저녁있는밤 수요조사</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0f1a;
    --card: #1a1a2e;
    --border: #2d2d4e;
    --primary: #7c6af7;
    --accent: #a78bfa;
    --light: #1e1e3a;
    --text: #e8e8f0;
    --sub: #9090b0;
    --muted: #5a5a7a;
    --yes: #7c6af7;
    --no: #2d2d4e;
    --green: #34d399;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Noto Sans KR', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  header {
    background: linear-gradient(135deg, #1a1040 0%, #0f0f1a 100%);
    padding: 32px 24px 52px; position: relative; overflow: hidden;
    border-bottom: 1px solid var(--border);
  }
  header::before {
    content: ''; position: absolute;
    top: -60px; right: -60px; width: 200px; height: 200px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(124,106,247,0.15) 0%, transparent 70%);
  }
  header::after {
    content: ''; position: absolute;
    bottom: -2px; left: 0; right: 0; height: 28px;
    background: var(--bg);
    clip-path: ellipse(55% 100% at 50% 100%);
  }
  .hdr-inner { max-width: 660px; margin: 0 auto; }
  header h1 { font-size: 1.7rem; font-weight: 900; color: #fff; letter-spacing: -0.5px; }
  .hdr-sub { color: var(--accent); font-size: 0.85rem; margin-top: 6px; opacity: 0.8; }
  .event-badge {
    display: inline-flex; align-items: center; gap: 8px;
    margin-top: 14px; padding: 8px 16px;
    background: rgba(124,106,247,0.15); border: 1px solid rgba(124,106,247,0.3);
    border-radius: 30px; font-size: 0.83rem; font-weight: 700; color: var(--accent);
  }

  main { max-width: 660px; margin: 0 auto; padding: 0 16px 80px; }

  .steps { display: flex; gap: 0; margin-bottom: 20px; padding-top: 20px; }
  .step { flex: 1; text-align: center; padding: 12px 8px; font-size: 0.8rem; color: var(--muted); border-bottom: 2px solid var(--border); position: relative; transition: all 0.2s; }
  .step.active { color: var(--accent); border-color: var(--accent); font-weight: 700; }
  .step.done { color: var(--green); border-color: var(--green); }
  .step .num { display: inline-block; width: 22px; height: 22px; line-height: 20px; border-radius: 50%; border: 1.5px solid currentColor; font-size: 0.75rem; margin-right: 5px; vertical-align: middle; }

  .card { background: var(--card); border: 1px solid var(--border); border-radius: 18px; padding: 22px; margin-bottom: 16px; }
  .card-title { font-size: 1.05rem; font-weight: 800; color: #fff; margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }

  .cls-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 10px; }
  .cls-btn { padding: 18px 12px; background: var(--light); border: 1.5px solid var(--border); border-radius: 14px; font-family: inherit; font-size: 0.95rem; font-weight: 700; color: var(--text); cursor: pointer; transition: all 0.18s; text-align: center; }
  .cls-btn:hover { border-color: var(--accent); transform: translateY(-2px); }
  .cls-btn.selected { background: rgba(124,106,247,0.15); border-color: var(--primary); color: var(--accent); box-shadow: 0 4px 16px rgba(124,106,247,0.25); }
  .cls-btn .cls-name { font-size: 1rem; }
  .cls-btn .cls-age { font-size: 0.72rem; color: var(--sub); margin-top: 4px; font-weight: 500; }

  .child-list { display: flex; flex-direction: column; gap: 8px; }
  .child-row { display: flex; align-items: center; gap: 10px; padding: 12px 14px; background: var(--light); border: 1.5px solid var(--border); border-radius: 12px; transition: all 0.15s; }
  .child-row.yes { border-color: var(--primary); background: rgba(124,106,247,0.08); }
  .child-name { flex: 1; font-size: 0.97rem; font-weight: 600; color: var(--text); }
  .toggle-group { display: flex; gap: 4px; background: var(--bg); padding: 3px; border-radius: 9px; border: 1px solid var(--border); }
  .toggle-btn { padding: 6px 14px; background: transparent; border: none; border-radius: 6px; font-family: inherit; font-size: 0.78rem; font-weight: 700; color: var(--sub); cursor: pointer; transition: all 0.15s; }
  .toggle-btn.active.yes-btn { background: var(--primary); color: #fff; }
  .toggle-btn.active.no-btn { background: var(--muted); color: #fff; }
  .toggle-btn.active.ext-btn { background: #f59e0b; color: #fff; }
  .child-row.ext { border-color: rgba(245,158,11,0.5); background: rgba(245,158,11,0.07); }

  .quick-actions { display: flex; gap: 8px; margin-bottom: 14px; flex-wrap: wrap; }
  .quick-btn { padding: 7px 14px; background: var(--light); border: 1px solid var(--border); border-radius: 20px; font-family: inherit; font-size: 0.78rem; font-weight: 600; color: var(--sub); cursor: pointer; transition: all 0.15s; }
  .quick-btn:hover { border-color: var(--accent); color: var(--accent); }

  .submit-bar { position: fixed; bottom: 0; left: 0; right: 0; padding: 14px 16px; background: linear-gradient(180deg, transparent 0%, var(--bg) 30%); pointer-events: none; }
  .submit-bar-inner { max-width: 660px; margin: 0 auto; display: flex; gap: 10px; pointer-events: auto; }
  .btn { flex: 1; padding: 16px; border: none; border-radius: 14px; font-family: inherit; font-size: 0.97rem; font-weight: 800; cursor: pointer; transition: all 0.18s; }
  .btn-primary { background: linear-gradient(135deg, var(--primary), var(--accent)); color: #fff; box-shadow: 0 6px 20px rgba(124,106,247,0.35); }
  .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(124,106,247,0.45); }
  .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; transform: none; box-shadow: none; }
  .btn-ghost { flex: 0 0 auto; padding: 16px 20px; background: var(--card); border: 1px solid var(--border); color: var(--sub); }

  .summary-pill { display: inline-flex; align-items: center; gap: 8px; padding: 6px 14px; background: rgba(52,211,153,0.12); border: 1px solid rgba(52,211,153,0.3); border-radius: 20px; font-size: 0.82rem; font-weight: 700; color: var(--green); margin-bottom: 10px; }

  .toast { position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%) translateY(100px); padding: 14px 22px; background: var(--card); border: 1px solid var(--accent); border-radius: 12px; color: #fff; font-size: 0.88rem; font-weight: 700; opacity: 0; transition: all 0.3s; z-index: 1000; box-shadow: 0 8px 32px rgba(0,0,0,0.4); }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  .empty { text-align: center; padding: 40px 20px; color: var(--muted); font-size: 0.88rem; }

  .info-box { background: rgba(124,106,247,0.08); border: 1px solid rgba(124,106,247,0.25); border-radius: 12px; padding: 12px 14px; margin-bottom: 14px; font-size: 0.83rem; color: var(--accent); line-height: 1.5; }
</style>
</head>
<body>

<header>
  <div class="hdr-inner">
    <h1>🌙 저녁있는밤 수요조사</h1>
    <p class="hdr-sub">우리무지개어린이집 · 무지개어린이집</p>
    <div class="event-badge">📅 2026년 5월 14일 (목)</div>
  </div>
</header>

<main>
  <div class="steps">
    <div class="step active" id="step-1"><span class="num">1</span>반 선택</div>
    <div class="step" id="step-2"><span class="num">2</span>아동 표시</div>
    <div class="step" id="step-3"><span class="num">3</span>제출</div>
  </div>

  <!-- STEP 1: 반 선택 -->
  <div class="card" id="cardClass">
    <div class="card-title">📋 우리 반을 선택해주세요</div>
    <div class="cls-grid" id="clsGrid"></div>
  </div>

  <!-- STEP 2: 아동 명단 -->
  <div class="card" id="cardChildren" style="display:none;">
    <div class="card-title">
      <span id="selectedClsTitle">👶 아동 참여 여부</span>
    </div>
    <div class="info-box">
      💡 참여하는 아동은 <b>참여</b>, 참여하지 않는 아동은 <b>불참</b>, 연장반을 이용하는 아동은 <b>연장반</b>으로 표시해주세요.
    </div>
    <div class="quick-actions">
      <button class="quick-btn" onclick="toggleAll('yes')">✅ 전체 참여</button>
      <button class="quick-btn" onclick="toggleAll('no')">❌ 전체 불참</button>
      <button class="quick-btn" onclick="toggleAll('ext')" style="border-color:rgba(245,158,11,0.4);color:#f59e0b;">🌙 전체 연장반</button>
    </div>
    <div class="child-list" id="childList"></div>
    <div style="margin-top:14px;">
      <span class="summary-pill" id="summaryPill">참여 0명 / 전체 0명</span>
    </div>
  </div>
</main>

<div class="submit-bar" id="submitBar" style="display:none;">
  <div class="submit-bar-inner">
    <button class="btn btn-ghost" onclick="resetForm()">← 처음으로</button>
    <button class="btn btn-primary" id="submitBtn" onclick="submit()">제출하기</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, set, get } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyDojXJ_9pOnla8uG240APwo3Ik9gBddMw4",
  authDomain: "mujigae-swimming.firebaseapp.com",
  databaseURL: "https://mujigae-swimming-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "mujigae-swimming"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const EVENT_KEY = "evening_2026_05_14";

// ===== 아동 명부 (2026년 최신) =====
// 유아반만 (영아반·방과후반 제외)
const CLASSES = {
  "아침햇살": {
    age: "만3세 (장애반)",
    children: ["정태호", "고은호", "김이안", "전수호", "위단우", "서현우", "김윤우", "김지안"]
  },
  "고운햇살": {
    age: "만3·4세 (장애반)",
    children: ["박재희", "박지유", "김민준", "곽나율", "김은서", "홍하루", "김동휘", "임라희"]
  },
  "들꽃향기": {
    age: "만3세 (통합반)",
    children: ["한지후", "박은진", "곽시안", "박찬율", "설재은", "류시환", "강은호", "박다엘", "김사랑", "손리완", "이로아", "이소민", "방서윤", "김인우", "이은우", "임서우", "이하린", "김세윤"]
  },
  "푸른하늘": {
    age: "만4세 (통합반)",
    children: ["김아린", "김강준", "박진우", "한서후", "윤태언", "김서우", "백민지", "이하민", "강태희", "곽다온", "박준", "김세윤", "김지민", "이채민"]
  },
  "파도소리": {
    age: "만5세 이상 (장애반)",
    children: ["윤지아", "김수겸", "돌란샤나", "권민서", "최도윤", "장시영"]
  },
  "은빛물결": {
    age: "만5세 이상 (장애반)",
    children: ["이재헌", "박수현", "김성원", "정하준", "송유담", "박승빈", "김정후", "주현우", "신승혁", "김수호", "정연우", "최보민", "한다윤"]
  },
  "푸른바다": {
    age: "만5세 (통합반)",
    children: ["김평온", "김별리", "양준우", "강지호", "김도우", "백이엘", "이태헌", "오주원", "서연석", "임하라", "김태유", "조믿음", "유이서", "윤예나", "윤예지", "조가온", "곽시후", "이소민2"]
  }
};

let selectedClass = null;
let answers = {};

function renderClasses() {
  const grid = document.getElementById('clsGrid');
  grid.innerHTML = Object.keys(CLASSES).map(name => `
    <button class="cls-btn" onclick="selectClass('${name}')">
      <div class="cls-name">${name}</div>
      <div class="cls-age">${CLASSES[name].age}</div>
    </button>
  `).join('');
}

window.selectClass = function(name) {
  selectedClass = name;
  document.querySelectorAll('.cls-btn').forEach(b => {
    b.classList.toggle('selected', b.textContent.includes(name));
  });
  document.getElementById('selectedClsTitle').textContent = `👶 ${name} 아동 참여 여부`;
  document.getElementById('cardChildren').style.display = 'block';
  document.getElementById('submitBar').style.display = 'block';
  setStep(2);

  answers = {};
  CLASSES[name].children.forEach(c => answers[c] = null);
  renderChildren();

  setTimeout(() => {
    document.getElementById('cardChildren').scrollIntoView({ behavior: 'smooth', block: 'start' });
  }, 100);
};

function renderChildren() {
  const list = document.getElementById('childList');
  list.innerHTML = CLASSES[selectedClass].children.map(name => {
    const val = answers[name];
    const rowCls = val === 'yes' ? 'yes' : val === 'ext' ? 'ext' : '';
    return `
    <div class="child-row ${rowCls}" id="row-${name}">
      <div class="child-name">${name}</div>
      <div class="toggle-group">
        <button class="toggle-btn yes-btn ${val==='yes'?'active':''}" onclick="setAnswer('${name}','yes')">참여</button>
        <button class="toggle-btn no-btn ${val==='no'?'active':''}" onclick="setAnswer('${name}','no')">불참</button>
        <button class="toggle-btn ext-btn ${val==='ext'?'active':''}" onclick="setAnswer('${name}','ext')">연장반</button>
      </div>
    </div>
  `}).join('');
  updateSummary();
}

window.setAnswer = function(name, val) {
  answers[name] = val;
  renderChildren();
};

window.toggleAll = function(val) {
  Object.keys(answers).forEach(k => answers[k] = val);
  renderChildren();
};

function updateSummary() {
  const total = Object.keys(answers).length;
  const yesCount = Object.values(answers).filter(v => v === 'yes').length;
  const extCount = Object.values(answers).filter(v => v === 'ext').length;
  const decided = Object.values(answers).filter(v => v !== null).length;
  document.getElementById('summaryPill').textContent = `참여 ${yesCount}명 · 연장반 ${extCount}명 / 전체 ${total}명`;
  document.getElementById('submitBtn').disabled = decided !== total;
}

// ── 텔레그램 알림 ──────────────────────────────
const TG_TOKEN = '8705840306:AAFawx4brSyIxE7q94BIsHubqGB7x1FXyTw';
const TG_CHAT  = '8226355915';

async function sendTelegram(msg) {
  try {
    await fetch(`https://api.telegram.org/bot${TG_TOKEN}/sendMessage`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ chat_id: TG_CHAT, text: msg, parse_mode: 'HTML' })
    });
  } catch(e) { console.warn('텔레그램 전송 실패:', e); }
}
// ───────────────────────────────────────────────

window.submit = async function() {
  const yesList = Object.keys(answers).filter(k => answers[k] === 'yes');
  const noList  = Object.keys(answers).filter(k => answers[k] === 'no');
  const extList = Object.keys(answers).filter(k => answers[k] === 'ext');

  // 기존 데이터 확인 (신규 제출인지 수정인지 판별)
  const prevSnap = await get(ref(db, `${EVENT_KEY}/classes/${selectedClass}`));
  const isUpdate = prevSnap.exists();

  try {
    await set(ref(db, `${EVENT_KEY}/classes/${selectedClass}`), {
      yes: yesList,
      no: noList,
      ext: extList,
      yesCount: yesList.length,
      noCount: noList.length,
      extCount: extList.length,
      total: yesList.length + noList.length + extList.length,
      submittedAt: new Date().toISOString()
    });

    setStep(3);
    showToast(`✅ ${selectedClass} 제출 완료! 참여 ${yesList.length}명 · 연장반 ${extList.length}명`);

    // 텔레그램 알림 전송
    const now = new Date().toLocaleString('ko-KR', { month:'numeric', day:'numeric', hour:'2-digit', minute:'2-digit' });
    const icon = isUpdate ? '🔄' : '📋';
    const label = isUpdate ? '수정 제출' : '신규 제출';
    const yesStr = yesList.length ? yesList.join(', ') : '없음';
    const extStr = extList.length ? extList.join(', ') : '없음';
    const noStr  = noList.length  ? noList.join(', ')  : '없음';
    const msg =
`${icon} <b>[저녁있는밤 ${label}]</b>
📅 2026년 5월 14일 (목)
🏫 <b>${selectedClass}</b> · ${now}

✅ 참여 ${yesList.length}명: ${yesStr}
🌙 연장반 ${extList.length}명: ${extStr}
❌ 불참 ${noList.length}명: ${noStr}`;
    sendTelegram(msg);

    setTimeout(resetForm, 2000);
  } catch (e) {
    showToast('❌ 제출 실패: ' + e.message);
  }
};

window.resetForm = function() {
  selectedClass = null;
  answers = {};
  document.getElementById('cardChildren').style.display = 'none';
  document.getElementById('submitBar').style.display = 'none';
  document.querySelectorAll('.cls-btn').forEach(b => b.classList.remove('selected'));
  setStep(1);
  window.scrollTo({ top: 0, behavior: 'smooth' });
};

function setStep(n) {
  for (let i = 1; i <= 3; i++) {
    const el = document.getElementById('step-' + i);
    el.className = 'step' + (i < n ? ' done' : i === n ? ' active' : '');
  }
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2800);
}

renderClasses();
</script>
</body>
</html>
