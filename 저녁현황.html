<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🌙 저녁있는밤 현황</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0f1a; --card: #1a1a2e; --border: #2d2d4e;
    --primary: #7c6af7; --accent: #a78bfa; --light: #1e1e3a;
    --text: #e8e8f0; --sub: #9090b0; --muted: #5a5a7a;
    --green: #34d399; --warn: #fbbf24;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Noto Sans KR', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  /* 로그인 */
  #loginOverlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); display: flex; align-items: center; justify-content: center; z-index: 9999; backdrop-filter: blur(6px); }
  .login-box { background: var(--card); border: 1px solid var(--border); border-radius: 24px; padding: 40px 36px; text-align: center; max-width: 320px; width: 90%; }
  .login-box .icon { font-size: 2.4rem; margin-bottom: 12px; }
  .login-box h2 { font-size: 1.2rem; font-weight: 900; color: #fff; margin-bottom: 6px; }
  .login-box p { font-size: 0.82rem; color: var(--sub); margin-bottom: 22px; }
  .pw-input { width: 100%; padding: 13px; border: 1.5px solid var(--border); border-radius: 12px; background: var(--light); font-family: 'DM Mono', monospace; font-size: 1.4rem; text-align: center; letter-spacing: 8px; outline: none; color: #fff; margin-bottom: 12px; transition: border 0.2s; }
  .pw-input:focus { border-color: var(--accent); }
  .login-btn { width: 100%; padding: 13px; background: linear-gradient(135deg, var(--primary), var(--accent)); border: none; border-radius: 12px; color: #fff; font-family: inherit; font-weight: 800; font-size: 0.95rem; cursor: pointer; }
  .pw-err { color: #ff6b6b; font-size: 0.78rem; margin-top: 6px; min-height: 16px; }

  header {
    background: linear-gradient(135deg, #1a1040 0%, #0f0f1a 100%);
    padding: 28px 24px; border-bottom: 1px solid var(--border);
  }
  .hdr-inner { max-width: 900px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; gap: 12px; flex-wrap: wrap; }
  header h1 { font-size: 1.5rem; font-weight: 900; color: #fff; letter-spacing: -0.5px; }
  header p { color: var(--accent); font-size: 0.85rem; margin-top: 4px; }
  .refresh-btn { padding: 10px 16px; border: 1.5px solid var(--border); border-radius: 10px; background: transparent; font-family: inherit; font-size: 0.82rem; font-weight: 700; color: var(--sub); cursor: pointer; transition: all 0.15s; }
  .refresh-btn:hover { border-color: var(--accent); color: var(--accent); }

  main { max-width: 900px; margin: 0 auto; padding: 20px 16px 40px; }

  .summary-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 18px; }
  .s-card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 18px 14px; text-align: center; }
  .s-card.green { border-color: rgba(52,211,153,0.35); background: rgba(52,211,153,0.06); }
  .s-card.warn { border-color: rgba(251,191,36,0.35); background: rgba(251,191,36,0.06); }
  .s-num { font-family: 'DM Mono', monospace; font-size: 2rem; font-weight: 700; color: #fff; }
  .s-card.green .s-num { color: var(--green); }
  .s-card.warn .s-num { color: var(--warn); }
  .s-lbl { font-size: 0.78rem; color: var(--sub); margin-top: 4px; font-weight: 600; }

  .card { background: var(--card); border: 1px solid var(--border); border-radius: 18px; padding: 22px; margin-bottom: 16px; }
  .card-title { font-size: 1.05rem; font-weight: 800; color: #fff; margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }

  .cls-cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 12px; }
  .cls-row { background: var(--light); border: 1.5px solid var(--border); border-radius: 14px; padding: 16px; }
  .cls-row.submitted { border-color: rgba(52,211,153,0.4); background: rgba(52,211,153,0.04); }
  .cls-row.pending { border-color: rgba(251,191,36,0.3); background: rgba(251,191,36,0.04); }
  .cls-row-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
  .cls-name { font-size: 1rem; font-weight: 800; color: #fff; }
  .cls-status { font-size: 0.75rem; padding: 3px 9px; border-radius: 12px; font-weight: 700; }
  .cls-status.done { background: rgba(52,211,153,0.18); color: var(--green); }
  .cls-status.pending { background: rgba(251,191,36,0.15); color: var(--warn); }
  .cls-stats { display: flex; gap: 14px; font-size: 0.85rem; color: var(--sub); margin-bottom: 8px; font-family: 'DM Mono', monospace; }
  .cls-stats b { color: var(--text); }
  .cls-time { font-size: 0.72rem; color: var(--muted); margin-top: 6px; font-family: 'DM Mono', monospace; }
  .name-list { font-size: 0.82rem; color: var(--text); line-height: 1.6; padding: 8px 0 0; border-top: 1px dashed var(--border); margin-top: 6px; }
  .name-list .label { font-size: 0.72rem; color: var(--sub); font-weight: 700; margin-right: 4px; }
  .name-list .yes-names { color: var(--accent); }
  .name-list .no-names { color: var(--muted); }

  .toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(100px); padding: 14px 22px; background: var(--card); border: 1px solid var(--accent); border-radius: 12px; color: #fff; font-size: 0.88rem; font-weight: 700; opacity: 0; transition: all 0.3s; z-index: 1000; }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<!-- 로그인 -->
<div id="loginOverlay">
  <div class="login-box">
    <div class="icon">🌙</div>
    <h2>관리자 로그인</h2>
    <p>저녁있는밤 수요조사 현황</p>
    <input type="password" class="pw-input" id="pwInput" maxlength="6" placeholder="••••" onkeydown="if(event.key==='Enter')tryLogin()">
    <button class="login-btn" onclick="tryLogin()">확인</button>
    <div class="pw-err" id="pwErr"></div>
  </div>
</div>

<header>
  <div class="hdr-inner">
    <div>
      <h1>🌙 저녁있는밤 현황</h1>
      <p>2026년 5월 14일 (목) · 무지개어린이집</p>
    </div>
    <button class="refresh-btn" onclick="loadData()">🔄 새로고침</button>
  </div>
</header>

<main>
  <div class="summary-grid">
    <div class="s-card"><div class="s-num" id="s-total">-</div><div class="s-lbl">총 참여 아동</div></div>
    <div class="s-card green"><div class="s-num" id="s-submitted">-</div><div class="s-lbl">제출 완료 반</div></div>
    <div class="s-card warn"><div class="s-num" id="s-pending">-</div><div class="s-lbl">미제출 반</div></div>
  </div>

  <div class="card">
    <div class="card-title">📋 반별 참여 현황</div>
    <div class="cls-cards" id="clsCards">
      <div style="color:var(--muted);font-size:0.88rem;">불러오는 중...</div>
    </div>
  </div>
</main>

<div class="toast" id="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, get } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyDojXJ_9pOnla8uG240APwo3Ik9gBddMw4",
  authDomain: "mujigae-swimming.firebaseapp.com",
  databaseURL: "https://mujigae-swimming-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "mujigae-swimming"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const EVENT_KEY = "evening_2026_05_14";

const ALL_CLASSES = ["아침햇살", "고운햇살", "들꽃향기", "푸른하늘", "파도소리", "은빛물결", "푸른바다"];

window.tryLogin = function() {
  const pw = document.getElementById('pwInput').value;
  if (pw === '7117') {
    document.getElementById('loginOverlay').style.display = 'none';
    loadData();
  } else {
    document.getElementById('pwErr').textContent = '비밀번호가 올바르지 않습니다';
    document.getElementById('pwInput').value = '';
  }
};

window.loadData = async function() {
  try {
    const snap = await get(ref(db, `${EVENT_KEY}/classes`));
    const data = snap.exists() ? snap.val() : {};

    let totalYes = 0;
    let submitted = 0;

    const cards = ALL_CLASSES.map(cls => {
      const d = data[cls];
      if (d) {
        submitted++;
        totalYes += (d.yesCount || 0);
        const yesNames = (d.yes || []).join(', ') || '없음';
        const noNames = (d.no || []).join(', ') || '없음';
        const timeStr = d.submittedAt
          ? new Date(d.submittedAt).toLocaleString('ko-KR', { month:'numeric', day:'numeric', hour:'2-digit', minute:'2-digit' })
          : '';
        return `
          <div class="cls-row submitted">
            <div class="cls-row-head">
              <div class="cls-name">${cls}</div>
              <div class="cls-status done">✓ 제출완료</div>
            </div>
            <div class="cls-stats">
              <span>참여 <b>${d.yesCount||0}</b>명</span>
              <span>불참 <b>${d.noCount||0}</b>명</span>
              <span>전체 <b>${d.total||0}</b>명</span>
            </div>
            <div class="name-list">
              <div><span class="label">참여:</span><span class="yes-names">${yesNames}</span></div>
              <div style="margin-top:4px;"><span class="label">불참:</span><span class="no-names">${noNames}</span></div>
            </div>
            <div class="cls-time">📥 ${timeStr}</div>
          </div>
        `;
      } else {
        return `
          <div class="cls-row pending">
            <div class="cls-row-head">
              <div class="cls-name">${cls}</div>
              <div class="cls-status pending">⏳ 미제출</div>
            </div>
            <div class="cls-stats" style="color:var(--muted);">아직 제출되지 않았습니다</div>
          </div>
        `;
      }
    }).join('');

    document.getElementById('clsCards').innerHTML = cards;
    document.getElementById('s-total').textContent = totalYes;
    document.getElementById('s-submitted').textContent = `${submitted}/${ALL_CLASSES.length}`;
    document.getElementById('s-pending').textContent = ALL_CLASSES.length - submitted;

    showToast('🔄 새로고침 완료');
  } catch (e) {
    showToast('❌ 불러오기 실패: ' + e.message);
  }
};

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

setTimeout(() => document.getElementById('pwInput').focus(), 100);
</script>
</body>
</html>
