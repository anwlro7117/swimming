<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>📋 부모상담 일정 신청</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #fafaf8;
    --primary: #2d5016;
    --accent: #6db33f;
    --light: #e8f5d9;
    --muted: #8a9e7a;
    --card: #ffffff;
    --border: #e0ead0;
    --text: #1a2612;
    --sub: #5a6e4a;
    --slot1: #2d5016;
    --slot2: #6db33f;
    --warn: #e07b39;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Noto Sans KR', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  /* 헤더 */
  header {
    background: var(--primary);
    padding: 36px 24px 56px;
    position: relative; overflow: hidden;
  }
  header::before {
    content: '';
    position: absolute; bottom: -2px; left: 0; right: 0; height: 32px;
    background: var(--bg);
    clip-path: ellipse(55% 100% at 50% 100%);
  }
  .hdr-inner { max-width: 680px; margin: 0 auto; display: flex; align-items: flex-start; justify-content: space-between; gap: 16px; }
  .hdr-text h1 { font-size: 1.7rem; font-weight: 900; color: #fff; letter-spacing: -0.5px; }
  .hdr-text p { color: #a8c880; font-size: 0.85rem; margin-top: 6px; line-height: 1.6; }
  .leaf { font-size: 2.5rem; opacity: 0.4; }

  /* 메인 */
  main { max-width: 680px; margin: 0 auto; padding: 0 16px 80px; }

  /* 카드 */
  .card {
    background: var(--card);
    border-radius: 20px;
    box-shadow: 0 2px 16px rgba(45,80,22,0.08);
    padding: 26px;
    margin-bottom: 14px;
    border: 1.5px solid var(--border);
  }
  .card-title {
    font-size: 0.88rem; font-weight: 700; color: var(--primary);
    margin-bottom: 18px; display: flex; align-items: center; gap: 8px;
  }
  .card-title::before {
    content: ''; display: block; width: 4px; height: 18px;
    border-radius: 2px; background: linear-gradient(var(--accent), var(--primary));
  }

  /* 날짜 범위 안내 */
  .date-range-info {
    background: var(--light);
    border: 1.5px solid var(--accent);
    border-radius: 14px;
    padding: 14px 18px;
    display: flex; align-items: center; gap: 12px;
    margin-bottom: 14px;
  }
  .date-range-info .icon { font-size: 1.5rem; }
  .date-range-info .txt { font-size: 0.88rem; line-height: 1.7; }
  .date-range-info .txt strong { color: var(--primary); font-weight: 700; }

  /* 단계 표시 */
  .steps { display: flex; gap: 0; margin-bottom: 20px; }
  .step {
    flex: 1; text-align: center; padding: 10px 4px;
    font-size: 0.75rem; font-weight: 600; color: var(--muted);
    border-bottom: 3px solid var(--border);
    transition: all 0.2s;
  }
  .step.active { color: var(--primary); border-color: var(--accent); }
  .step.done { color: var(--accent); border-color: var(--accent); }
  .step-num {
    display: inline-flex; align-items: center; justify-content: center;
    width: 22px; height: 22px; border-radius: 50%;
    background: var(--border); color: var(--muted);
    font-size: 0.7rem; font-weight: 700; margin-bottom: 4px;
  }
  .step.active .step-num { background: var(--accent); color: #fff; }
  .step.done .step-num { background: var(--primary); color: #fff; }

  /* 반 선택 */
  .group-label { font-size: 0.7rem; font-weight: 700; color: var(--muted); letter-spacing: 0.8px; margin: 12px 0 7px; }
  .class-grid { display: flex; flex-wrap: wrap; gap: 8px; }
  .cls-btn {
    padding: 9px 18px; border: 2px solid var(--border); border-radius: 30px;
    background: #fff; font-family: inherit; font-size: 0.86rem; font-weight: 500;
    cursor: pointer; transition: all 0.18s; color: var(--text);
  }
  .cls-btn:hover { border-color: var(--accent); background: var(--light); }
  .cls-btn.sel { border-color: var(--primary); background: var(--primary); color: #fff; }

  /* 아동 선택 */
  .child-grid { display: flex; flex-wrap: wrap; gap: 8px; }
  .child-btn {
    padding: 10px 18px; border: 2px solid var(--border); border-radius: 30px;
    background: #fff; font-family: inherit; font-size: 0.9rem; font-weight: 600;
    cursor: pointer; transition: all 0.18s; color: var(--text);
  }
  .child-btn:hover { border-color: var(--accent); background: var(--light); }
  .child-btn.sel { border-color: var(--primary); background: var(--primary); color: #fff; }

  /* 날짜 탭 */
  .date-tabs { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 16px; }
  .date-tab {
    padding: 7px 14px; border: 2px solid var(--border); border-radius: 10px;
    background: #fff; font-family: 'DM Mono', monospace; font-size: 0.8rem; font-weight: 500;
    cursor: pointer; transition: all 0.15s; color: var(--sub);
  }
  .date-tab:hover { border-color: var(--accent); }
  .date-tab.sel { border-color: var(--primary); background: var(--primary); color: #fff; }

  /* 시간 슬롯 그리드 */
  .slot-section { margin-bottom: 20px; }
  .slot-title { font-size: 0.78rem; font-weight: 700; color: var(--sub); margin-bottom: 10px; display: flex; align-items: center; gap: 6px; }
  .slot-badge {
    display: inline-flex; align-items: center; gap: 4px;
    padding: 3px 10px; border-radius: 20px; font-size: 0.72rem; font-weight: 700;
  }
  .badge-1 { background: var(--primary); color: #fff; }
  .badge-2 { background: var(--accent); color: #fff; }
  .slot-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 7px; }
  .slot-btn {
    padding: 10px 4px; border: 2px solid var(--border); border-radius: 12px;
    background: #fff; font-family: 'DM Mono', monospace; font-size: 0.78rem; font-weight: 500;
    cursor: pointer; transition: all 0.15s; color: var(--sub); text-align: center;
    position: relative;
  }
  .slot-btn:hover:not(.disabled) { border-color: var(--accent); background: var(--light); }
  .slot-btn.pick1 { border-color: var(--slot1); background: var(--slot1); color: #fff; }
  .slot-btn.pick2 { border-color: var(--slot2); background: var(--slot2); color: #fff; }
  .slot-btn.disabled { opacity: 0.35; cursor: not-allowed; background: #f5f5f5; }
  .slot-btn .rank-badge {
    position: absolute; top: -7px; right: -7px;
    width: 18px; height: 18px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 0.65rem; font-weight: 900; border: 2px solid #fff;
  }
  .slot-btn.pick1 .rank-badge { background: var(--warn); }
  .slot-btn.pick2 .rank-badge { background: #555; }

  /* 선택 요약 */
  .summary-box {
    background: var(--light); border: 2px solid var(--accent);
    border-radius: 14px; padding: 14px 18px; margin-top: 16px;
    font-size: 0.85rem; line-height: 2;
  }
  .summary-box .row { display: flex; align-items: center; gap: 8px; }
  .summary-box .lbl { color: var(--sub); font-weight: 600; min-width: 50px; }
  .summary-box .val { font-weight: 700; color: var(--primary); }

  /* 제출 버튼 */
  .submit-btn {
    width: 100%; margin-top: 20px; padding: 16px;
    border: none; border-radius: 16px;
    background: linear-gradient(135deg, var(--primary), var(--accent));
    color: #fff; font-family: inherit; font-size: 1rem; font-weight: 700;
    cursor: pointer; box-shadow: 0 4px 18px rgba(45,80,22,0.35);
    transition: all 0.2s; letter-spacing: 0.3px;
  }
  .submit-btn:hover { transform: translateY(-2px); box-shadow: 0 7px 22px rgba(45,80,22,0.4); }
  .submit-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

  /* 완료 화면 */
  .done-card {
    text-align: center; padding: 48px 24px;
    background: var(--card); border-radius: 20px;
    border: 1.5px solid var(--border);
    box-shadow: 0 2px 16px rgba(45,80,22,0.08);
  }
  .done-icon { font-size: 4rem; margin-bottom: 16px; }
  .done-card h2 { font-size: 1.4rem; font-weight: 900; color: var(--primary); margin-bottom: 8px; }
  .done-card p { color: var(--sub); font-size: 0.9rem; line-height: 1.8; }
  .done-summary {
    background: var(--light); border-radius: 14px; padding: 16px 20px;
    margin: 20px 0; text-align: left; font-size: 0.88rem; line-height: 2.2;
  }
  .done-summary span { font-weight: 700; color: var(--primary); }
  .back-btn {
    margin-top: 16px; padding: 12px 28px;
    border: 2px solid var(--primary); border-radius: 30px;
    background: transparent; font-family: inherit; font-size: 0.88rem; font-weight: 700;
    color: var(--primary); cursor: pointer; transition: all 0.2s;
  }
  .back-btn:hover { background: var(--primary); color: #fff; }

  /* 토스트 */
  .toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(70px);
    background: var(--primary); color: #fff; padding: 12px 22px; border-radius: 30px;
    font-size: 0.88rem; font-weight: 600; box-shadow: 0 5px 20px rgba(45,80,22,0.35);
    transition: transform 0.3s cubic-bezier(.34,1.56,.64,1); z-index: 999; white-space: nowrap;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }

  /* 히든 */
  #step2card, #step3card, #doneCard { display: none; }

  @media (max-width: 480px) {
    .slot-grid { grid-template-columns: repeat(3, 1fr); }
    header h1 { font-size: 1.35rem; }
  }
</style>
</head>
<body>

<header>
  <div class="hdr-inner">
    <div class="hdr-text">
      <h1>📋 부모상담 일정 신청</h1>
      <p>무지개어린이집<br>희망 시간을 1순위·2순위로 선택해주세요</p>
    </div>
    <div class="leaf">🌿</div>
  </div>
</header>

<main>

  <!-- 상담 기간 안내 -->
  <div class="date-range-info">
    <div class="icon">📅</div>
    <div class="txt">
      <strong id="dateRangeText">상담 기간을 불러오는 중...</strong><br>
      희망 날짜와 시간을 1순위·2순위로 선택해주세요
    </div>
  </div>

  <!-- 단계 표시 -->
  <div class="steps">
    <div class="step active" id="st1">
      <div class="step-num">1</div><br>반·아동 선택
    </div>
    <div class="step" id="st2">
      <div class="step-num">2</div><br>날짜 선택
    </div>
    <div class="step" id="st3">
      <div class="step-num">3</div><br>시간 선택
    </div>
  </div>

  <!-- STEP 1: 반 + 아동 선택 -->
  <div class="card" id="step1card">
    <div class="card-title">🏫 반 및 아동 선택</div>
    <div class="group-label">영아반</div>
    <div class="class-grid" id="g-영아반"></div>
    <div class="group-label">유아반</div>
    <div class="class-grid" id="g-유아반"></div>

    <div id="childSection" style="display:none; margin-top:20px;">
      <div class="card-title" style="margin-bottom:12px;">👶 아동 선택</div>
      <div class="child-grid" id="childGrid"></div>
    </div>
  </div>

  <!-- STEP 2: 날짜 선택 -->
  <div class="card" id="step2card">
    <div class="card-title">📅 날짜 선택</div>
    <div class="date-tabs" id="dateTabs"></div>
  </div>

  <!-- STEP 3: 시간 선택 -->
  <div class="card" id="step3card">
    <div class="card-title">⏰ 희망 시간 선택</div>
    <div style="font-size:0.8rem; color:var(--sub); margin-bottom:16px; line-height:1.8;">
      <span style="display:inline-block;width:12px;height:12px;background:var(--primary);border-radius:3px;margin-right:4px;vertical-align:middle;"></span> <strong>1순위</strong> 먼저 선택 →
      <span style="display:inline-block;width:12px;height:12px;background:var(--accent);border-radius:3px;margin-right:4px;vertical-align:middle;"></span> <strong>2순위</strong> 선택
    </div>
    <div class="slot-section">
      <div class="slot-title">🌅 오전 <span class="slot-badge badge-1">09:00 ~ 12:00</span></div>
      <div class="slot-grid" id="slots-am"></div>
    </div>
    <div class="slot-section">
      <div class="slot-title">☀️ 오후 <span class="slot-badge badge-2">12:00 ~ 18:00</span></div>
      <div class="slot-grid" id="slots-pm"></div>
    </div>

    <div class="summary-box" id="summaryBox" style="display:none;">
      <div class="row"><span class="lbl">아동</span><span class="val" id="sum-child"></span></div>
      <div class="row"><span class="lbl">날짜</span><span class="val" id="sum-date"></span></div>
      <div class="row"><span class="lbl">1순위</span><span class="val" id="sum-t1"></span></div>
      <div class="row"><span class="lbl">2순위</span><span class="val" id="sum-t2"></span></div>
    </div>

    <button class="submit-btn" id="submitBtn" onclick="submit()" disabled>✅ 신청 완료하기</button>
  </div>

  <!-- 완료 화면 -->
  <div class="done-card" id="doneCard">
    <div class="done-icon">🌿</div>
    <h2>신청이 완료됐어요!</h2>
    <p>담임선생님께서 확인 후<br>최종 일정을 안내드릴게요.</p>
    <div class="done-summary" id="doneSummary"></div>
    <button class="back-btn" onclick="resetForm()">↩ 다른 아동 신청하기</button>
  </div>

</main>

<div class="toast" id="toast"></div>

<!-- Firebase SDK -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, set, get, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyDojXJ_9pOnla8uG240APwo3Ik9gBddMw4",
  authDomain: "mujigae-swimming.firebaseapp.com",
  databaseURL: "https://mujigae-swimming-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "mujigae-swimming",
  storageBucket: "mujigae-swimming.firebasestorage.app",
  messagingSenderId: "279953220805",
  appId: "1:279953220805:web:b24cbe70f8556416c0bcac"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

// ── 명부 (치료사·방과후 제외) ──────────────────────────────
const ROSTER = {
  "영아반": {
    "아기참새": ["박범준","정윤하","장다엘","고이솔","조은준"],
    "초롱이슬": ["전유주","박유준","양선우","박하엘","박유하"]
  },
  "유아반": {
    "아침햇살": ["정태호","고은호","김이안","전수호","위단우","서현우","김윤우","김지안"],
    "고운햇살": ["박재희","박지유","김민준","곽나율","김은서","장태양","홍하루","김동휘"],
    "들꽃향기": ["한지후","박은진","곽시안","박찬율","설재은","류시환","강은호","박다엘","김사랑","손리완","이로아","이소민","방서윤","김인우","이은우","임서우","이하린","김세윤"],
    "푸른하늘": ["김아린","김강준","박진우","한서후","윤태언","김서우","백민지","이하민","강태희","곽다온","박준","김세윤","김지민"],
    "파도소리": ["윤지아","김수겸","돌란샤나","권민서","최도윤","장시영"],
    "은빛물결": ["이재헌","박수현","김성원","정하준","송유담","박승빈","김정후","주현수","신승혁","김수호","정연우","최보민","한다윤"],
    "푸른바다": ["김평온","김별리","양준우","강지호","김도우","백이엘","이태헌","오주원","서연석","임하라","김태유","조믿음","유이서","윤예나","윤예지","조가온","곽시후","이소민2"]
  }
};

// ── 시간 슬롯 생성 (09:00 ~ 18:00, 30분 단위) ──────────────
function makeSlots() {
  const slots = [];
  for (let h = 9; h < 18; h++) {
    slots.push(`${String(h).padStart(2,'0')}:00`);
    slots.push(`${String(h).padStart(2,'0')}:30`);
  }
  return slots;
}
const ALL_SLOTS = makeSlots();
const AM_SLOTS = ALL_SLOTS.filter(s => parseInt(s) < 12);
const PM_SLOTS = ALL_SLOTS.filter(s => parseInt(s) >= 12);

// ── 상태 ─────────────────────────────────────────────────
let selectedClass = null;
let selectedChild = null;
let selectedDate = null;
let pick1 = null;
let pick2 = null;
let dateRange = [];
let bookedSlots = {};  // { '날짜_시간': count }

// ── 상담 기간 불러오기 ────────────────────────────────────
get(ref(db, 'consultConfig')).then(snap => {
  const cfg = snap.val();
  if (cfg && cfg.startDate && cfg.endDate) {
    dateRange = getDateRange(cfg.startDate, cfg.endDate);
    document.getElementById('dateRangeText').textContent =
      `📅 상담 기간: ${cfg.startDate} ~ ${cfg.endDate}`;
  } else {
    // 기본값: 3월 16일 ~ 3월 31일
    dateRange = getDateRange('2026-03-16', '2026-03-31');
    document.getElementById('dateRangeText').textContent =
      '📅 상담 기간: 2026-03-16 ~ 2026-03-31';
  }
  renderDateTabs();
});

function getDateRange(start, end) {
  const dates = [];
  const cur = new Date(start);
  const endD = new Date(end);
  while (cur <= endD) {
    const wd = cur.getDay();
    if (wd !== 0 && wd !== 6) dates.push(cur.toISOString().slice(0,10));
    cur.setDate(cur.getDate() + 1);
  }
  return dates;
}

// ── 반 버튼 생성 ──────────────────────────────────────────
Object.entries(ROSTER).forEach(([group, classes]) => {
  const grid = document.getElementById('g-' + group);
  if (!grid) return;
  Object.keys(classes).forEach(cls => {
    const btn = document.createElement('button');
    btn.className = 'cls-btn';
    btn.textContent = cls + '반';
    btn.onclick = () => {
      document.querySelectorAll('.cls-btn').forEach(b => b.classList.remove('sel'));
      btn.classList.add('sel');
      selectedClass = cls;
      selectedChild = null;
      renderChildren(cls);
      document.getElementById('step2card').style.display = 'none';
      document.getElementById('step3card').style.display = 'none';
      setStep(1);
    };
    grid.appendChild(btn);
  });
});

function renderChildren(cls) {
  const children = ROSTER["영아반"][cls] || ROSTER["유아반"][cls] || [];
  const grid = document.getElementById('childGrid');
  grid.innerHTML = '';
  children.forEach(name => {
    const btn = document.createElement('button');
    btn.className = 'child-btn';
    btn.textContent = name;
    btn.onclick = () => {
      document.querySelectorAll('.child-btn').forEach(b => b.classList.remove('sel'));
      btn.classList.add('sel');
      selectedChild = name;
      document.getElementById('step2card').style.display = 'block';
      document.getElementById('step3card').style.display = 'none';
      setStep(2);
      document.getElementById('step2card').scrollIntoView({ behavior:'smooth', block:'start' });
    };
    grid.appendChild(btn);
  });
  document.getElementById('childSection').style.display = 'block';
}

// ── 날짜 탭 ──────────────────────────────────────────────
function renderDateTabs() {
  const tabs = document.getElementById('dateTabs');
  tabs.innerHTML = '';
  const weekdays = ['일','월','화','수','목','금','토'];
  dateRange.forEach(date => {
    const d = new Date(date);
    const btn = document.createElement('button');
    btn.className = 'date-tab';
    btn.innerHTML = `${date.slice(5)}<br><span style="font-size:0.7rem;">${weekdays[d.getDay()]}요일</span>`;
    btn.onclick = () => {
      document.querySelectorAll('.date-tab').forEach(b => b.classList.remove('sel'));
      btn.classList.add('sel');
      selectedDate = date;
      pick1 = null; pick2 = null;
      loadBookedSlots(date).then(() => {
        renderSlots();
        document.getElementById('step3card').style.display = 'block';
        setStep(3);
        document.getElementById('step3card').scrollIntoView({ behavior:'smooth', block:'start' });
      });
    };
    tabs.appendChild(btn);
  });
}

// ── 예약된 슬롯 불러오기 ─────────────────────────────────
async function loadBookedSlots(date) {
  const snap = await get(ref(db, 'consult'));
  bookedSlots = {};
  if (!snap.val()) return;
  Object.values(snap.val()).forEach(entry => {
    if (!entry.date || entry.date !== date) return;
    [entry.time1, entry.time2].forEach(t => {
      if (t) bookedSlots[t] = (bookedSlots[t] || 0) + 1;
    });
  });
}

// ── 슬롯 렌더링 ──────────────────────────────────────────
function renderSlots() {
  ['am','pm'].forEach(part => {
    const slots = part === 'am' ? AM_SLOTS : PM_SLOTS;
    const el = document.getElementById('slots-' + part);
    el.innerHTML = '';
    slots.forEach(time => {
      const btn = document.createElement('button');
      btn.className = 'slot-btn';
      btn.dataset.time = time;
      btn.textContent = time;
      btn.onclick = () => pickSlot(time);
      el.appendChild(btn);
    });
  });
  updateSlotUI();
  updateSummary();
}

function pickSlot(time) {
  if (pick1 === time) { pick1 = null; }
  else if (pick2 === time) { pick2 = null; }
  else if (!pick1) { pick1 = time; }
  else if (!pick2) {
    if (time === pick1) return;
    pick2 = time;
  } else {
    showToast('⚠️ 이미 1순위·2순위가 선택됐어요. 해제 후 다시 선택해주세요.');
    return;
  }
  updateSlotUI();
  updateSummary();
}

function updateSlotUI() {
  document.querySelectorAll('.slot-btn').forEach(btn => {
    const t = btn.dataset.time;
    btn.className = 'slot-btn';
    btn.innerHTML = t;
    if (t === pick1) {
      btn.classList.add('pick1');
      btn.innerHTML = `${t}<span class="rank-badge">1</span>`;
    } else if (t === pick2) {
      btn.classList.add('pick2');
      btn.innerHTML = `${t}<span class="rank-badge">2</span>`;
    }
  });
}

function updateSummary() {
  const box = document.getElementById('summaryBox');
  const submitBtn = document.getElementById('submitBtn');
  if (pick1) {
    box.style.display = 'block';
    document.getElementById('sum-child').textContent = selectedChild + ' (' + selectedClass + '반)';
    document.getElementById('sum-date').textContent = selectedDate;
    document.getElementById('sum-t1').textContent = pick1 + ' ✅';
    document.getElementById('sum-t2').textContent = pick2 ? pick2 + ' ✅' : '미선택';
    submitBtn.disabled = false;
  } else {
    box.style.display = 'none';
    submitBtn.disabled = true;
  }
}

// ── 제출 ─────────────────────────────────────────────────
async function submit() {
  if (!selectedChild || !selectedDate || !pick1) {
    showToast('⚠️ 아동, 날짜, 1순위 시간을 선택해주세요');
    return;
  }
  const submitBtn = document.getElementById('submitBtn');
  submitBtn.disabled = true;
  submitBtn.textContent = '저장 중...';

  try {
    const key = `${selectedDate}_${selectedClass}_${selectedChild}_${Date.now()}`;
    await set(ref(db, 'consult/' + key), {
      child: selectedChild,
      cls: selectedClass,
      date: selectedDate,
      time1: pick1,
      time2: pick2 || null,
      submittedAt: new Date().toISOString()
    });

    // 완료 화면
    document.getElementById('step1card').style.display = 'none';
    document.getElementById('step2card').style.display = 'none';
    document.getElementById('step3card').style.display = 'none';
    document.getElementById('doneCard').style.display = 'block';
    document.getElementById('doneSummary').innerHTML = `
      <span>아동</span> ${selectedChild} (${selectedClass}반)<br>
      <span>날짜</span> ${selectedDate}<br>
      <span>1순위</span> ${pick1}<br>
      <span>2순위</span> ${pick2 || '미선택'}
    `;
    window.scrollTo({ top: 0, behavior: 'smooth' });
  } catch(e) {
    showToast('❌ 저장 실패: ' + e.message);
    submitBtn.disabled = false;
    submitBtn.textContent = '✅ 신청 완료하기';
  }
}

// ── 초기화 ────────────────────────────────────────────────
function resetForm() {
  selectedClass = null; selectedChild = null;
  selectedDate = null; pick1 = null; pick2 = null;
  document.querySelectorAll('.cls-btn, .child-btn, .date-tab').forEach(b => b.classList.remove('sel'));
  document.getElementById('childSection').style.display = 'none';
  document.getElementById('step2card').style.display = 'none';
  document.getElementById('step3card').style.display = 'none';
  document.getElementById('doneCard').style.display = 'none';
  document.getElementById('step1card').style.display = 'block';
  setStep(1);
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function setStep(n) {
  [1,2,3].forEach(i => {
    const el = document.getElementById('st' + i);
    el.className = 'step' + (i < n ? ' done' : i === n ? ' active' : '');
  });
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2800);
}

window.submit = submit;
window.resetForm = resetForm;
</script>
</body>
</html>
